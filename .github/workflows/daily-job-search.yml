name: Aria Daily Job Search

on:
  schedule:
    # 6:00 AM IST = 00:30 UTC (adjusted for UTC, runs at 6 AM IST)
    - cron: '30 0 * * *'
  workflow_dispatch:  # Allow manual trigger

jobs:
  job-search:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      
      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: Run Job Search
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          python job_search.py
      
      - name: Commit and Push Reports
        if: always()
        run: |
          git config user.name "Aria Bot"
          git config user.email "aria-bot@example.com"
          git add -A
          git diff --quiet && git diff --staged --quiet || git commit -m "Generate daily job report $(date -u +'%Y-%m-%d')"
          git push
        continue-on-error: true
      
      - name: Upload Reports Artifact
        if: always()
        uses: actions/upload-artifact@v3
        with:
          name: job-reports
          path: workspace/reports/
          retention-days: 30
